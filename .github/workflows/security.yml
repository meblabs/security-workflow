name: Security

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref, branch, tag, or SHA to scan"
        required: true
        type: string

      repository:
        description: "Repository to scan and comment on, in owner/name format. Defaults to the caller repository."
        required: false
        type: string
        default: ""

      pr-number:
        description: "Pull request number used for comments. Required when PR comments are enabled from workflow_call."
        required: false
        type: string
        default: ""

      head-ref:
        description: "Pull request head branch name used for source links in PR comments."
        required: false
        type: string
        default: ""

      node-version:
        description: "Node.js version used when npm metadata is needed"
        required: false
        type: string
        default: "22.x"

      security-config:
        description: "Semgrep config/rulesets. Use 'auto' or a space-separated list such as 'p/javascript p/typescript p/owasp-top-ten'"
        required: false
        type: string
        default: "auto"

      security-severity-threshold:
        description: "Minimum Semgrep severity that fails the security gate: low/info, medium/warning, high/error"
        required: false
        type: string
        default: "high"

      security-vulnerability-severities:
        description: "Comma-separated Trivy severities that fail the security gate"
        required: false
        type: string
        default: "HIGH,CRITICAL"

      security-skip-dirs:
        description: "Comma-separated directories skipped by Trivy filesystem/config scans"
        required: false
        type: string
        default: "node_modules,.git,.security-workflow,security-reports,coverage,dist,build,.next,.nuxt"

      semgrep-version:
        description: "Semgrep Docker image tag"
        required: false
        type: string
        default: "latest"

      trivy-version:
        description: "Trivy CLI version used by aquasecurity/trivy-action"
        required: false
        type: string
        default: "v0.71.0"

      gitleaks-version:
        description: "Gitleaks Docker image tag"
        required: false
        type: string
        default: "v8.30.1"

      zizmor-version:
        description: "zizmor Docker image tag"
        required: false
        type: string
        default: "v1.25.2"

      zizmor-config:
        description: "Optional repository-relative zizmor config file. Defaults to the built-in MEBlabs policy."
        required: false
        type: string
        default: ""

      dockerfile-path:
        description: "Dockerfile path used for optional Docker image build and scan"
        required: false
        type: string
        default: "Dockerfile"

      docker-build-context:
        description: "Docker build context used for optional Docker image build and scan"
        required: false
        type: string
        default: "."

      docker-build-args:
        description: "Optional newline-separated Docker build args in KEY=VALUE format"
        required: false
        type: string
        default: ""

      docker-image-name:
        description: "Local Docker image name used for security scanning"
        required: false
        type: string
        default: "meblabs-security-scan"

      post-pr-comment:
        description: "Post or update a consolidated security summary comment on pull requests"
        required: false
        type: boolean
        default: true

      upload-artifact:
        description: "Upload security reports as a workflow artifact"
        required: false
        type: boolean
        default: true

      artifact-retention-days:
        description: "Retention days for the security-reports artifact"
        required: false
        type: number
        default: 14

    secrets:
      token:
        description: "Bot token used for pull request comments. Use secrets.MEBBOT."
        required: true

      github-token:
        description: "GitHub token used for checkout and read/API-backed scanner checks. Use secrets.GITHUB_TOKEN."
        required: true

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository != '' && inputs.repository || github.repository }}
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          token: ${{ secrets['github-token'] }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ hashFiles('**/package-lock.json', '**/npm-shrinkwrap.json') != '' && 'npm' || '' }}
          cache-dependency-path: |
            **/package-lock.json
            **/npm-shrinkwrap.json
          package-manager-cache: false

      - name: Resolve security workflow source
        id: workflow_source
        shell: bash
        env:
          JOB_WORKFLOW_REF: ${{ job.workflow_ref }}
        run: |
          set -euo pipefail

          workflow_source="${JOB_WORKFLOW_REF%@*}"
          workflow_ref="${JOB_WORKFLOW_REF##*@}"
          workflow_repo="${workflow_source%%/.github/workflows/*}"
          source_path=".security-workflow/source"

          if [[ -z "$workflow_repo" || "$workflow_repo" == "$workflow_source" || -z "$workflow_ref" || "$workflow_ref" == "$JOB_WORKFLOW_REF" ]]; then
            echo "Unable to resolve reusable workflow source from job.workflow_ref='${JOB_WORKFLOW_REF}'." >&2
            exit 2
          fi

          {
            echo "repository=${workflow_repo}"
            echo "ref=${workflow_ref}"
            echo "source_path=${source_path}"
          } >> "$GITHUB_OUTPUT"

          echo "Security workflow source repository: ${workflow_repo}"
          echo "Security workflow source ref: ${workflow_ref}"

      - name: Fetch security workflow scripts
        id: fetch_security_workflow
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.workflow_source.outputs.repository }}
          ref: ${{ steps.workflow_source.outputs.ref }}
          path: ${{ steps.workflow_source.outputs.source_path }}
          fetch-depth: 1
          token: ${{ secrets['github-token'] }}
          persist-credentials: false

      - name: Run security workflow
        id: security_run
        shell: bash
        continue-on-error: true
        env:
          SECURITY_WORKFLOW_SOURCE: ${{ steps.workflow_source.outputs.source_path }}
          SECURITY_WORKFLOW_GITHUB_TOKEN: ${{ secrets['github-token'] }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_SECURITY_CONFIG: ${{ inputs.security-config }}
          INPUT_SECURITY_SEVERITY_THRESHOLD: ${{ inputs.security-severity-threshold }}
          INPUT_SECURITY_VULNERABILITY_SEVERITIES: ${{ inputs.security-vulnerability-severities }}
          INPUT_SECURITY_SKIP_DIRS: ${{ inputs.security-skip-dirs }}
          INPUT_SEMGREP_VERSION: ${{ inputs.semgrep-version }}
          INPUT_TRIVY_VERSION: ${{ inputs.trivy-version }}
          INPUT_GITLEAKS_VERSION: ${{ inputs.gitleaks-version }}
          INPUT_ZIZMOR_VERSION: ${{ inputs.zizmor-version }}
          INPUT_ZIZMOR_CONFIG: ${{ inputs.zizmor-config }}
          INPUT_DOCKERFILE_PATH: ${{ inputs.dockerfile-path }}
          INPUT_DOCKER_BUILD_CONTEXT: ${{ inputs.docker-build-context }}
          INPUT_DOCKER_BUILD_ARGS: ${{ inputs.docker-build-args }}
          INPUT_DOCKER_IMAGE_NAME: ${{ inputs.docker-image-name }}
          HEAD_REF: ${{ inputs.head-ref }}
        run: |
          set -euo pipefail

          "$SECURITY_WORKFLOW_SOURCE/bin/security-workflow" \
            --repo "$PWD" \
            --ref "$INPUT_REF" \
            --security-config "$INPUT_SECURITY_CONFIG" \
            --security-severity-threshold "$INPUT_SECURITY_SEVERITY_THRESHOLD" \
            --security-vulnerability-severities "$INPUT_SECURITY_VULNERABILITY_SEVERITIES" \
            --security-skip-dirs "$INPUT_SECURITY_SKIP_DIRS" \
            --semgrep-version "$INPUT_SEMGREP_VERSION" \
            --trivy-version "$INPUT_TRIVY_VERSION" \
            --gitleaks-version "$INPUT_GITLEAKS_VERSION" \
            --zizmor-version "$INPUT_ZIZMOR_VERSION" \
            --zizmor-config "$INPUT_ZIZMOR_CONFIG" \
            --dockerfile-path "$INPUT_DOCKERFILE_PATH" \
            --docker-build-context "$INPUT_DOCKER_BUILD_CONTEXT" \
            --docker-build-args "$INPUT_DOCKER_BUILD_ARGS" \
            --docker-image-name "$INPUT_DOCKER_IMAGE_NAME"

      - name: Upload security reports
        id: upload_security_reports
        if: ${{ always() && inputs.upload-artifact && hashFiles('security-reports/**') != '' }}
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: security-reports
          path: security-reports
          if-no-files-found: ignore
          retention-days: ${{ inputs.artifact-retention-days }}

      - name: Post security summary in the pull request
        if: ${{ always() && inputs.post-pr-comment && inputs.pr-number != '' && steps.fetch_security_workflow.outcome == 'success' && hashFiles('security-reports/security-status.json') != '' }}
        uses: actions/github-script@v9
        continue-on-error: true
        env:
          SECURITY_WORKFLOW_SOURCE: ${{ steps.workflow_source.outputs.source_path }}
          SCANNED_REF: ${{ inputs.ref }}
          COMMENT_REPOSITORY: ${{ inputs.repository != '' && inputs.repository || github.repository }}
          PR_NUMBER: ${{ inputs.pr-number }}
          HEAD_REF: ${{ inputs.head-ref }}
          UPLOAD_ARTIFACT: ${{ inputs.upload-artifact }}
          SECURITY_REPORTS_ARTIFACT_URL: ${{ steps.upload_security_reports.outputs.artifact-url }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ secrets.token }}
          script: |
            const postSecurityComment = require(`${process.env.SECURITY_WORKFLOW_SOURCE}/scripts/post-pr-comment.js`);
            await postSecurityComment({ github, core });

      - name: Fail security gate if blocking checks failed
        if: ${{ always() }}
        shell: bash
        env:
          SECURITY_GATE_OUTCOME: ${{ steps.security_run.outputs.security_gate_outcome }}
        run: |
          set -euo pipefail

          if [[ "$SECURITY_GATE_OUTCOME" != "success" ]]; then
            echo "Security gate failed."
            exit 1
          fi

          echo "Security gate passed."
