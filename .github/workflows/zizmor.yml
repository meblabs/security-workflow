name: zizmor

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  zizmor:
    name: zizmor analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # zizmorcore/* is not in the allowlist -> hash-pinned.
      # version pins the zizmor CLI to the org-standard version.
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          version: v1.25.2
